<section class="sf-panel mx-auto max-w-lg rounded-3xl p-8 shadow-sf">
  <h1 class="mb-6 text-center text-2xl font-black tracking-tight text-white">
    {{ 'PROFILE.TITLE' | translate }}
  </h1>
  <div class="flex flex-col items-center gap-4">
    @if (user.photoUrl(); as src) {
      <img
        [src]="src"
        alt=""
        class="h-28 w-28 rounded-full border-4 border-white/20 object-cover shadow-sf"
        width="112"
        height="112"
      />
    } @else {
      <div
        class="flex h-28 w-28 items-center justify-center rounded-full border-4 border-white/20 bg-gradient-to-br from-[var(--sf-blue)] to-[var(--sf-indigo)] text-3xl font-black text-white shadow-sf"
        aria-hidden="true"
      >
        {{ user.initials() }}
      </div>
    }
    <p class="text-center text-xl font-bold text-white">{{ user.displayName() }}</p>
  </div>
</section>
