name: DB Migrate (Render)

# GitHub runners CANNOT reach Render Postgres on port 5432 (P1001).
# Migrations must run ON Render using the internal DATABASE_URL.
#
# Setup (once):
#   1. Render → your API web service → Settings
#   2. Pre-Deploy Command:  bash scripts/render-predeploy.sh
#   3. Ensure DATABASE_URL is linked to skyflow-db (Internal URL)
#   4. Copy Deploy Hook URL → GitHub secret RENDER_DEPLOY_HOOK
#
# Then: Actions → Run workflow → triggers a Render deploy → migrate runs there.
on:
  workflow_dispatch:

jobs:
  trigger-render-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy (migrate runs in pre-deploy on Render)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "::error::Missing GitHub secret RENDER_DEPLOY_HOOK"
            echo "::error::Render → API service → Settings → Deploy Hook → copy URL"
            echo "::error::GitHub → Settings → Secrets → Actions → RENDER_DEPLOY_HOOK"
            exit 1
          fi
          echo "Triggering Render deploy…"
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
          echo ""
          echo "Deploy started. Open Render dashboard → Logs to watch:"
          echo "  bash scripts/render-predeploy.sh  →  npx prisma migrate deploy"
