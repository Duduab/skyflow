name: DB Migrate (Render)

# Runs `prisma migrate deploy` from a GitHub runner, which is NOT behind the
# local Zscaler agent, so it can reach the Render Postgres directly.
# Trigger manually: Actions tab → "DB Migrate (Render)" → Run workflow.
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Normalize DATABASE_URL secret
        env:
          RAW_DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$RAW_DATABASE_URL" ]; then
            echo "::error::GitHub secret DATABASE_URL is missing. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          # Trim whitespace and strip accidental surrounding quotes from paste.
          url="$(printf '%s' "$RAW_DATABASE_URL" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' -e 's/^"//' -e 's/"$//' -e "s/^'//" -e "s/'$//")"
          case "$url" in
            postgresql://*|postgres://*) ;;
            *)
              echo "::error::DATABASE_URL must start with postgresql:// or postgres://"
              echo "::error::Tip: paste the full URL only — no quotes, no DATABASE_URL= prefix."
              exit 1
              ;;
          esac
          echo "DATABASE_URL=$url" >> "$GITHUB_ENV"

      - name: Show migration status
        run: npx prisma migrate status

      - name: Apply migrations
        run: npx prisma migrate deploy
