name: DB Migrate (Render)

# Runs `prisma migrate deploy` from a GitHub runner, which is NOT behind the
# local Zscaler agent, so it can reach the Render Postgres directly.
# Trigger manually: Actions tab → "DB Migrate (Render)" → Run workflow.
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Normalize DATABASE_URL secret
        env:
          RAW_DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$RAW_DATABASE_URL" ]; then
            echo "::error::GitHub secret DATABASE_URL is missing."
            echo "::error::Repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "::error::Name: DATABASE_URL   Value: postgresql://USER:PASS@HOST/DB?sslmode=require"
            exit 1
          fi

          url="$(printf '%s' "$RAW_DATABASE_URL" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          # Common paste mistakes: surrounding quotes, or the whole .env line.
          url="$(printf '%s' "$url" | sed -E \
            -e 's/^"//' -e 's/"$//' \
            -e "s/^'//" -e "s/'$//" \
            -e 's/^[Dd][Aa][Tt][Aa][Bb][Aa][Ss][Ee]_[Uu][Rr][Ll][[:space:]]*=[[:space:]]*//')"

          case "$url" in
            postgresql://*|postgres://*)
              echo "DATABASE_URL looks valid (starts with $(printf '%.12s' "$url")…)"
              ;;
            *)
              echo "::error::DATABASE_URL must start with postgresql:// or postgres://"
              echo "::error::Got prefix: $(printf '%.24s' "$url")… (length ${#url})"
              echo "::error::"
              echo "::error::In GitHub Secrets use TWO fields:"
              echo "::error::  Name:  DATABASE_URL"
              echo "::error::  Value: postgresql://skyflow_db_user:PASSWORD@dpg-....render.com/skyflow_db?sslmode=require"
              echo "::error::Do NOT paste DATABASE_URL= or quotes into the Value box."
              exit 1
              ;;
          esac

          echo "DATABASE_URL=$url" >> "$GITHUB_ENV"

      - name: Show migration status
        run: npx prisma migrate status

      - name: Apply migrations
        run: npx prisma migrate deploy
