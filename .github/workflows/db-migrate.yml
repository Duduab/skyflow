name: DB Migrate (Render)

# Runs `prisma migrate deploy` from a GitHub runner, which is NOT behind the
# local Zscaler agent, so it can reach the Render Postgres directly.
# Trigger manually: Actions tab → "DB Migrate (Render)" → Run workflow.
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate DATABASE_URL secret
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::GitHub secret DATABASE_URL is missing. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          case "$DATABASE_URL" in
            postgresql://*|postgres://*) ;;
            *)
              echo "::error::DATABASE_URL must start with postgresql:// or postgres:// (no quotes, no spaces)."
              exit 1
              ;;
          esac

      - name: Show migration status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate status

      - name: Apply migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy
